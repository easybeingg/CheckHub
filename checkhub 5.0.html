  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#252a45;border-radius:2px}
  input,textarea,select{outline:none}
  button{cursor:pointer;font-family:inherit}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:${E};font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:10px 0 6px;transition:color .2s;flex:1}
  .nav-item.active{color:${I}}
  .pill-tab{background:none;border:none;color:${E};font-size:14px;font-weight:500;padding:8px 20px;border-radius:20px;transition:all .2s;font-family:inherit}
  .pill-tab.active{background:#252a45;color:${U}}
  .btn-primary{background:${I};color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;padding:16px;width:100%;transition:opacity .2s;font-family:inherit}
  .btn-primary:active{opacity:.85}
  .btn-green{background:${me};color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;padding:18px;width:100%;font-family:inherit;transition:opacity .2s}
  .btn-green:active{opacity:.85}
  .btn-ghost{background:#252a45;color:${U};border:none;border-radius:10px;font-size:14px;font-weight:500;padding:10px 18px;transition:opacity .2s;font-family:inherit}
  .btn-ghost:active{opacity:.8}
  .btn-danger{background:none;color:${ge};border:1.5px solid ${ge};border-radius:14px;font-size:16px;font-weight:600;padding:16px;width:100%;font-family:inherit;transition:opacity .2s}
  .inp{background:#252a45;border:none;border-radius:12px;color:${U};font-family:inherit;font-size:16px;padding:14px 16px;width:100%;transition:box-shadow .2s}
  .inp:focus{box-shadow:0 0 0 2px ${I}60}
  .inp::placeholder{color:#404870}
  .set-inp{background:#252a45;border:none;border-radius:10px;color:${U};font-size:20px;font-weight:700;text-align:center;width:100%;padding:12px 8px;font-family:inherit}
  .set-inp:focus{box-shadow:0 0 0 2px ${I}60}
  .icon-btn{width:52px;height:52px;border-radius:14px;background:#252a45;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .icon-btn.sel{box-shadow:0 0 0 2.5px ${I};background:${I}25}
  .clr-dot{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;transition:transform .15s;flex-shrink:0}
  .clr-dot.sel{outline:3px solid #fff;outline-offset:2px}
  .clr-dot:hover{transform:scale(1.1)}
  /* FAB */
  .fab{position:fixed;bottom:90px;right:calc(50% - 240px + 16px);width:56px;height:56px;border-radius:50%;background:${I};border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px ${I}55;z-index:40;transition:transform .2s;font-family:inherit}
  .fab.open{transform:rotate(45deg)}
  .fab:active{transform:scale(.93)}
  .fab.open:active{transform:rotate(45deg) scale(.93)}
  /* Quick-create menu */
  .qc-menu{position:fixed;bottom:160px;right:calc(50% - 240px + 16px);z-index:39;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .qc-item{display:flex;align-items:center;gap:12px;animation:qcIn .18s ease both}
  @keyframes qcIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .qc-label{background:#1e2340;color:${U};font-size:14px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .qc-circle{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.3);flex-shrink:0;font-size:20px}
  /* Modal \u2014 key fix: overscroll-behavior so inner scroll doesn't bleed */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:80;display:flex;align-items:flex-end;justify-content:center;overscroll-behavior:contain}
  .modal-sheet{background:#181c2e;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:28px 20px 52px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  .handle{width:36px;height:4px;border-radius:2px;background:#303660;margin:0 auto 24px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:${E};margin-bottom:10px}
  .set-done{width:34px;height:34px;border-radius:50%;border:1.5px solid #303660;background:none;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
  .set-done.done{background:${me};border-color:${me}}
  .set-del{width:34px;height:34px;border-radius:50%;border:1.5px solid #303660;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .bar{border-radius:4px 4px 0 0;transition:height .4s ease;min-height:2px}
  .card{background:${$r};border-radius:20px;padding:18px}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:${me};color:#fff;padding:10px 22px;border-radius:999px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;animation:toastIn .2s ease;pointer-events:none}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .fade{animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .goal-ring-track{fill:none;stroke:#252a45;stroke-width:8}
  .goal-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease;transform:rotate(-90deg);transform-origin:50% 50%}
  .pbar-bg{height:8px;background:#252a45;border-radius:4px;overflow:hidden;margin-top:10px}
  .pbar-fill{height:100%;border-radius:4px;transition:width .6s ease}
  /* Status buttons */
  .status-btn{width:34px;height:34px;border-radius:50%;border:2px solid #303660;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;background:none}
  .status-btn.active-green{background:${me}22;border-color:${me}}
  .status-btn.active-red{background:${ge}22;border-color:${ge}}
  .status-btn.active-yellow{background:${Ar}22;border-color:${Ar}}
  /* Day tracker row */
  .day-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .day-letter{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .day-dot{width:11px;height:11px;border-radius:50%}
  /* Habit list sheet rows */
  .hl-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#1e2340;border-radius:14px;transition:all .2s}
  .hl-row.pick-target{border:2px dashed ${I};background:${I}12;cursor:pointer}
  .hl-row.pick-source{border:2px solid ${I};background:${I}20}
  /* Habit detail panel */
  .detail-panel{background:${Oc};border-radius:16px;padding:16px;margin-top:0;overflow:hidden;animation:panelIn .22s ease}
  @keyframes panelIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:480px){.fab{right:16px}.qc-menu{right:16px}}
