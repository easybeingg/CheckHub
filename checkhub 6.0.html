  .set-inp:focus{box-shadow:0 0 0 2px ${L}60}

  .qc-circle{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.3);flex-shrink:0;font-size:20px}
