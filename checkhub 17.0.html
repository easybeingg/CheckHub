  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;background:${xf};overflow:hidden}
  input,textarea,button{font-family:inherit;outline:none}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:${F};border-radius:2px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes qcIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade{animation:fadeIn .25s ease}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:${P};font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:10px 0 6px;transition:color .2s;flex:1;cursor:pointer}
  .nav-btn.on{color:${D}}
  .pill{background:none;border:none;color:${P};font-size:14px;font-weight:500;padding:8px 20px;border-radius:20px;cursor:pointer;transition:all .2s}
  .pill.on{background:${F};color:${U}}
  .btn{background:${D};color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;padding:16px;width:100%;cursor:pointer;transition:opacity .2s}
  .btn:active{opacity:.85}
  .btn-g{background:${Se};color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;padding:18px;width:100%;cursor:pointer}
  .btn-ghost{background:${F};color:${U};border:none;border-radius:10px;font-size:14px;font-weight:500;padding:10px 18px;cursor:pointer}
  .btn-danger{background:none;color:${ie};border:1.5px solid ${ie};border-radius:14px;font-size:16px;font-weight:600;padding:16px;width:100%;cursor:pointer}
  .inp{background:${F};border:1.5px solid transparent;border-radius:12px;color:${U};font-size:16px;padding:14px 16px;width:100%;transition:border-color .2s}
  .inp:focus{border-color:${D}}
  .inp::placeholder{color:#404870}
  .card{background:${Wt};border-radius:20px;padding:18px}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:${P};margin-bottom:10px;display:block}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:${Se};color:#fff;padding:10px 22px;border-radius:999px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;animation:toastIn .2s ease;pointer-events:none}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:80;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:${Wt};border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:28px 20px 130px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .handle{width:36px;height:4px;border-radius:2px;background:#303660;margin:0 auto 24px}
  .icon-btn{width:52px;height:52px;border-radius:14px;background:${F};border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .icon-btn.sel{box-shadow:0 0 0 2.5px ${D};background:${D}25}
  .clr{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;transition:transform .15s;flex-shrink:0}
  .clr.sel{outline:3px solid #fff;outline-offset:2px}
  .clr:hover{transform:scale(1.1)}
  .fab{position:fixed;bottom:90px;right:calc(50% - 240px + 16px);width:56px;height:56px;border-radius:50%;background:${D};border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px ${D}55;z-index:40;cursor:pointer;transition:transform .2s}
  .fab.open{transform:rotate(45deg)}
  .qc-menu{position:fixed;bottom:160px;right:calc(50% - 240px + 16px);z-index:39;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .qc-item{display:flex;align-items:center;gap:12px;animation:qcIn .18s ease both}
  .qc-label{background:${Fe};color:${U};font-size:14px;font-weight:600;padding:8px 16px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .qc-circle{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0}
  .status-btn{width:34px;height:34px;border-radius:50%;border:2px solid ${F};display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;flex-shrink:0;transition:all .18s}
  .status-btn.g{background:${Se}22;border-color:${Se}}
  .status-btn.r{background:${ie}22;border-color:${ie}}
  .status-btn.y{background:${Yt}22;border-color:${Yt}}
  .day-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .day-letter{font-size:9px;font-weight:700}
  .day-dot{width:11px;height:11px;border-radius:50%}
  .hl-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:${Fe};border-radius:14px;transition:all .2s}
  .hl-row.src{border:2px solid ${D};background:${D}20}
  .hl-row.tgt{border:2px dashed ${D};background:${D}12;cursor:pointer}
  .detail{background:${Fe};border-radius:16px;padding:16px;margin-top:12px;animation:fadeIn .22s ease}
  .pbar{height:8px;background:${F};border-radius:4px;overflow:hidden;margin-top:8px}
  .pbar-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .bar{border-radius:4px 4px 0 0;min-height:2px;transition:height .4s ease}
  .set-inp{background:${F};border:none;border-radius:10px;color:${U};font-size:18px;font-weight:700;text-align:center;width:100%;padding:10px 6px;font-family:inherit}
  .set-inp:focus{outline:2px solid ${D}}
  .set-done{width:34px;height:34px;border-radius:50%;border:1.5px solid ${F};background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .set-done.on{background:${Se};border-color:${Se}}
  .set-del{width:34px;height:34px;border-radius:50%;border:1.5px solid ${F};background:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .goal-track{fill:none;stroke:${F};stroke-width:8}
